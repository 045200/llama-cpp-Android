name: Build Android Native arm64 llama-server (CPU-Only)

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'llama.cpp 仓库 (owner/repo)'
        required: true
        default: 'ggml-org/llama.cpp'
      build_type:
        description: 'Release 或 Debug'
        required: true
        default: 'Release'
  schedule:
    - cron: '0 0 */3 * *'   # 每 3 天 UTC 0 点检测一次

env:
  LLAMA_REPO: ${{ github.event.inputs.repo || 'ggml-org/llama.cpp' }}
  CMAKE_BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}
  NDK_VERSION: r27d
  BUILD_DIR: build-android
  ARTIFACT_BASE_NAME: "llama-server-android-arm64"

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装 CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.27.x'

      - name: 安装 Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: 安装 Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: 获取上游最新稳定 Tag (bXXXX)
        id: get_tag
        uses: oprypin/find-latest-tag@v1
        with:
          repository: ${{ env.LLAMA_REPO }}
          regex: '^b[0-9]+$'
          sort-tags: true

      - name: 恢复上次 Tag 缓存
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: last_tag.txt
          key: last-tag-${{ env.LLAMA_REPO }}-${{ steps.get_tag.outputs.tag }}

      - name: 判断是否需要构建
        id: check
        run: |
          LATEST_TAG="${{ steps.get_tag.outputs.tag }}"
          if [ -z "$LATEST_TAG" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" == "schedule" ]; then
            if [ -f last_tag.txt ] && [ "$(cat last_tag.txt)" = "$LATEST_TAG" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: 克隆 llama.cpp
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.LLAMA_REPO }}
          ref: ${{ steps.check.outputs.latest_tag }}
          path: llama.cpp
          fetch-depth: 1

      # ---------- 构建 CPU 版本 (仅 OpenMP) ----------
      - name: 配置 & 编译 CPU 版
        if: steps.check.outputs.skip != 'true'
        working-directory: llama.cpp
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}

          # NDK 系统库路径
          NDK_LIB_PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android"

          # 编译器优化标志
          COMMON_FLAGS="-march=armv9-a -mtune=cortex-a710"

          # 链接器标志：静态链接 OpenMP
          LINKER_FLAGS="-L${NDK_LIB_PATH} -Wl,-Bstatic -lomp -Wl,-Bdynamic"

          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-35 \
            -DCMAKE_C_FLAGS="$COMMON_FLAGS" \
            -DCMAKE_CXX_FLAGS="$COMMON_FLAGS" \
            -DGGML_OPENMP=ON \
            -DGGML_LLAMAFILE=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DANDROID_STL=c++_static \
            -DGGML_BLAS=OFF \
            -DGGML_OPENCL=OFF \
            -DGGML_VULKAN=OFF \
            -DGGML_METAL=OFF \
            -DGGML_CUDA=OFF \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DGGML_CPU_AARCH64_REPACK=ON \
            -DGGML_ARM_I8MM=ON \
            -DGGML_ARM_DOTPROD=ON \
            -DCMAKE_EXE_LINKER_FLAGS="$LINKER_FLAGS" \
            -G Ninja

          cmake --build . --config "${{ env.CMAKE_BUILD_TYPE }}" -j $(nproc)

      - name: 准备二进制
        if: steps.check.outputs.skip != 'true'
        run: |
          cp llama.cpp/${{ env.BUILD_DIR }}/bin/llama-server ./llama-server
          chmod +x ./llama-server

      - name: 上传 Artifact
        if: steps.check.outputs.skip != 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_BASE_NAME }}-${{ steps.check.outputs.latest_tag }}
          path: ./llama-server
          retention-days: 15

      - name: 发布 Release (仅当定时触发且为新版本时)
        if: |
          steps.check.outputs.skip != 'true' &&
          success() &&
          github.event_name == 'schedule' &&
          steps.check.outputs.latest_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.latest_tag }}
          name: llama-server Android arm64 - ${{ steps.check.outputs.latest_tag }}
          body: |
            **上游版本**: ${{ steps.check.outputs.latest_tag }}
            **特性**: 集成 OpenMP CPU 多线程后端，适配 Armv9-A 系列 (armv9-a, cortex-a710 tune)
            **平台**: Android arm64-v8a (android-35+)
            **注意**: 本版本为纯 CPU 推理，不含 GPU 加速。
          files: ./llama-server
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: false

      - name: 清理旧 Releases（保留最新 5 个）
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[5:][] | .tagName' | while read tag; do
            gh release delete "$tag" --cleanup-tag --yes
          done

      - name: 清理旧 Workflow Runs（保留最新 3 条）
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3

      - name: 保存本次 Tag
        if: steps.check.outputs.skip != 'true' && success()
        run: echo "${{ steps.check.outputs.latest_tag }}" > last_tag.txt

      - name: 缓存 Tag
        if: steps.check.outputs.skip != 'true' && success()
        uses: actions/cache@v4
        with:
          path: last_tag.txt
          key: last-tag-${{ env.LLAMA_REPO }}-${{ steps.check.outputs.latest_tag }}